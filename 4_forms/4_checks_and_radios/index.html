<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checks and radios</title>
  <link
    rel="stylesheet"
    href="../../node_modules/bootstrap/dist/css/bootstrap.min.css"
  />
</head>
<body>
  <!-- main container -->
  <div class="container py-4">
    <!-- checks -->
    <div class="row flex-column">
      <div class="col-4 mx-auto">
        <h2>Checks</h2>
        <div class="mb-1">
          <input type="checkbox" name="def" id="def" class="form-check-input">
          <label for="def" class="form-check-label">Default checkbox</label>
        </div>
        <div class="mb-1">
          <input type="checkbox" name="chk" id="chk" class="form-check-input" checked>
          <label for="chk" class="form-check-label">Checked checkbox</label>
        </div>
      </div>
    </div>
  </div>
  <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
