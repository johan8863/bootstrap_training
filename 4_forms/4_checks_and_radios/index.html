<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checks and radios</title>
  <link
    rel="stylesheet"
    href="../../node_modules/bootstrap/dist/css/bootstrap.min.css"
  />
</head>
<body>
  <!-- main container -->
  <div class="container py-4">
    <!-- checks -->
    <div class="row flex-column">
      <div class="col-4 mx-auto mb-1">
        <h2>Checks</h2>
        <!-- Always wrap form check inputs within a .form-check class -->
        <div class="form-check">
          <input type="checkbox" name="def" id="def" class="form-check-input">
          <label for="def" class="form-check-label">Default checkbox</label>
        </div>
        <div class="form-check">
          <input type="checkbox" name="chk" id="chk" class="form-check-input" checked>
          <label for="chk" class="form-check-label">Checked checkbox</label>
        </div>
      </div>
    </div>
    <!-- disabled checks -->
    <div class="row flex-column">
      <div class="col-4 mx-auto mb-1">
        <h3>Disabled</h3>
        <div class="form-check">
          <input type="checkbox" name="" id="" class="form-check-input" disabled>
          <label for="">Default disabled checkbox</label>
        </div>
        <div class="form-check">
          <input type="checkbox" name="" id="" class="form-check-input" disabled checked>
          <label for="">Disabled checked checkbox</label>
        </div>
      </div>
    </div>
    <!-- radios -->
    <div class="col-4 mx-auto mb-1">
      <h2>Radios</h2>
      <!-- Always wrap form radio inputs within a .form-check class -->
      <div class="form-chek">
        <input type="radio" name="first" id="" class="form-check-input">
        <label for="">Default radio</label>
      </div>
      <div class="form-check">
        <input type="radio" name="first" id="" class="form-check-input" checked>
        <label for="">Default selected radio</label>
      </div>
    </div>
  </div>
  <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
