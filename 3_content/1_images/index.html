<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Images</title>
  <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
  <div class="container">
    <h1>Images</h1>
    <h2>Responsive images</h2>

    <div>
      <img src="assets/img/pineaple_farm.jpg" alt="pineaple farm" class="img-fluid">
    </div>

    <div class="row">
      <div class="col g-2">
        <img src="assets/img/path.jpg" alt="path" class="img-fluid">
      </div>

      <div class="col g-2">
        <img src="assets/img/fallen_sheet.jpg" alt="fallen sheet" class="img-fluid">
      </div>

      <h2>Image thumbnails</h2>
      <div class="row">
        <div class="col-md-3 mx-auto">
          <img src="assets/img/pineaple_farm.jpg" class="img-thumbnail">
        </div>
      </div>
    </div>
  </div>
  <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
