<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid System</title>
  <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="custom.css">
</head>
<body>
  <div class="container text-center mb-4">
    <h1 class="text-start">Columns</h1>
    <h2 class="text-start">Alignment</h2>
    <h3 class="text-start">Start</h3>
    <div class="row height-align border border-1 align-items-start">
      <div class="col border border-1">.col</div>
      <div class="col border border-1">.col</div>
      <div class="col border border-1">.col</div>
    </div>
    <h3 class="text-start">Center</h3>
    <div class="row height-align border border-1 align-items-center">
      <div class="col border border-1">.col</div>
      <div class="col border border-1">.col</div>
      <div class="col border border-1">.col</div>
    </div>
    <h3 class="text-start">End</h3>
    <div class="row height-align border border-1 align-items-end">
      <div class="col border border-1">.col</div>
      <div class="col border border-1">.col</div>
      <div class="col border border-1">.col</div>
    </div>
  </div>
  <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
