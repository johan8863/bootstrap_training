<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Containers</title>
  <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>
  <!-- Containers are required when using the default grid system. -->
  <div class="container border border-3 rounded-2 my-4 p-4">
    <h1>Containers</h1>
    <p class="lead">Bootstrap ships three diferent containers:</p>
    <ul>
      <li>
        <code>.container</code>, which sets a <code>max-width</code> at each responsive breakpoint
      </li>
      <li>
        <code>.container-{breakpoint}</code>, which is <code>width: 100%</code> until the specified breakpoint
      </li>
      <li>
        <code>.container-fluid</code>, which is <code>width: 100%</code> at all breakpoints
      </li>
    </ul>
  </div>
  <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
